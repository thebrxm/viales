    // 2. Procesar datos para Plotly
    const daysOrder = ['segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado', 'domingo'];
    const yLabels = [...daysOrder].reverse(); 
    const xLabels = Array.from({length: 24}, (_, i) => i);

    let zMatrix = Array(7).fill().map(() => Array(24).fill(0));
    let textMatrix = Array(7).fill().map(() => Array(24).fill(''));

    rawData.forEach(item => {
        const dayIndex = yLabels.indexOf(item.Dia);
        const hourIndex = item.Hora;
        if (dayIndex !== -1) {
            zMatrix[dayIndex][hourIndex] = item.Incidentes;
            textMatrix[dayIndex][hourIndex] = 
                `<b>${item.Dia.toUpperCase()}</b><br>${item.Hora}:00h<br>Incidentes: ${item.Incidentes}`;
        }
    });

    const categoricalPalette = [
        [0.00, '#f3e7c2'], [0.15, '#f0d88a'], [0.35, '#f5b041'],
        [0.55, '#f57c3d'], [0.75, '#ff3d2e'], [1.00, '#99002b']
    ];

    function renderPlot() {
        const isMiniature = window.innerWidth < 500;

        const data = [{
            x: xLabels, y: yLabels, z: zMatrix, text: textMatrix,
            hoverinfo: 'text', type: 'heatmap',
            colorscale: categoricalPalette,
            showscale: isMiniature ? false : true, // Esconde a barra lateral na miniatura
            colorbar: { title: 'Nº', titleside: 'right' }
        }];

        const layout = {
            // Ajuste de margens: na miniatura usamos quase 100% do espaço
            margin: isMiniature ? 
                { l: 45, r: 5, b: 25, t: 5 } : 
                { l: 100, r: 80, b: 50, t: 60 },
            xaxis: {
                title: isMiniature ? '' : 'Hora do Dia',
                tickmode: 'array',
                tickvals: [0, 6, 12, 18, 23], // Simplifica os números na miniatura
                fixedrange: true
            },
            yaxis: {
                tickmode: 'array',
                tickvals: yLabels,
                // Na miniatura, usamos apenas a primeira letra do dia para ganhar espaço
                ticktext: yLabels.map(d => isMiniature ? d.charAt(0).toUpperCase() : d.charAt(0).toUpperCase() + d.slice(1)),
                fixedrange: true
            },
            // Título apenas na versão expandida
            title: isMiniature ? '' : { text: 'Distribuição de Incidentes de Trânsito', font: { size: 18 } },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)'
        };

        Plotly.newPlot('heatmap', data, layout, { 
            responsive: true, 
            displayModeBar: false // Remove a barra de ferramentas do Plotly na miniatura
        });
    }

    renderPlot();
    window.onresize = renderPlot;
