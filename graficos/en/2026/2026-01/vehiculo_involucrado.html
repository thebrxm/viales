<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Involved Vehicle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #grafico-contenedor { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="grafico-contenedor"></div>
    <script>
        var chartDom = document.getElementById('grafico-contenedor');
        var myChart = echarts.init(chartDom);

        var option = {
            // --- CONFIGURACIÓN BASE (Colores y Datos) ---
            baseOption: {
                color: ['#0B192C', '#A1AAB4', '#E6E9EB'], 
                tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)', backgroundColor: 'rgba(255, 255, 255, 0.9)' },
                series: [{
                    name: 'Vehículo',
                    type: 'pie',
                    itemStyle: { borderWidth: 0 },
                    label: { position: 'inside', formatter: '{b}\n{d}%', fontFamily: 'Inter', fontSize: 11, lineHeight: 14, align: 'center' },
                    data: [
                        { value: 902, name: 'Cars', label: { color: '#ffffff' } },
                        { value: 629, name: 'Motorcycles', label: { color: '#1f2937' } },
                        { value: 243, name: 'Run-overs', label: { color: '#1f2937' } }
                    ]
                }]
            },
            // --- RESPONSIVE: Reglas según el tamaño ---
            media: [
                {
                    // PANTALLA GRANDE (Cuando se abre en el Lightbox)
                    query: { minWidth: 500 },
                    option: {
                        title: { show: true, text: 'Involved Vehicle', left: '2%', top: '5%', textStyle: { color: '#4b5563', fontSize: 16 } },
                        graphic: { elements: [{ type: 'image', style: { image: 'https://i.imgur.com/GXTFolo.png', width: 140, height: 40 }, right: '5%', top: '4%' }] },
                        legend: { show: true, orient: 'vertical', right: '5%', top: '20%', icon: 'square', itemGap: 10, textStyle: { color: '#4b5563', fontSize: 12 } },
                        series: [{ radius: '75%', center: ['40%', '55%'] }] // Torta desplazada a la izquierda
                    }
                },
                {
                    // MINIATURA (Dentro de la tarjeta del panel)
                    query: { maxWidth: 499 },
                    option: {
                        title: { show: false }, // Ocultamos título
                        graphic: { elements: [] }, // Ocultamos logo
                        legend: { show: true, orient: 'horizontal', bottom: '2%', left: 'center', icon: 'square', itemGap: 8, textStyle: { color: '#4b5563', fontSize: 10 } },
                        series: [{ radius: '65%', center: ['50%', '45%'] }] // Torta centrada y un poco más chica
                    }
                }
            ]
        };
        option && myChart.setOption(option);
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
