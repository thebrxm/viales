<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background: transparent; 
            font-family: 'Inter', sans-serif; 
            display: flex; align-items: center; justify-content: center; /* Centrado extra */ gap: 8px;
        }
        /* CAMBIO DE COLOR AQUÍ */
        .dia { color: #334155; font-weight: 800; font-size: 15px; text-transform: capitalize; }
        .hora { color: #ea580c; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>
    <div class="dia">Fridays</div>
    <div class="hora">12:00 — 17:00 hs</div>
</body>

</html>
